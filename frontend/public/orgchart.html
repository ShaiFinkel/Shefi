        // Helper function to create a pale/light version of a hex color
        const getPaleColor = (hexColor, opacity = 0.25) => {
            // Convert hex to RGB
            const hex = hexColor.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            // Blend with white to create pale version
            const paleR = Math.round(r + (255 - r) * (1 - opacity));
            const paleG = Math.round(g + (255 - g) * (1 - opacity));
            const paleB = Math.round(b + (255 - b) * (1 - opacity));
            return `rgb(${paleR}, ${paleG}, ${paleB})`;
        };

                };
                
                // Check for raise/calculation questions
                const percentMatch = q.match(/(\d+)\s*%/);
                const isRaiseQuestion = /raise|increase|העלאה|תוספת|how much|כמה/i.test(q);

                    if (!emp.salaryMonthly) {
                        return `${emp.fullName} doesn't have salary information.`;
                    }
                    const currentMonthly = parseFloat(emp.salaryMonthly);
                    const currentYearly = parseFloat(emp.salaryYearly) || currentMonthly * 12;
                    const raiseAmountMonthly = currentMonthly * (percentage / 100);
                    const raiseAmountYearly = currentYearly * (percentage / 100);
                    const newMonthly = currentMonthly + raiseAmountMonthly;
                    const newYearly = currentYearly + raiseAmountYearly;
                    const currency = emp.currency || '₪';
                    return `${emp.fullName} - ${percentage}% raise:\n` +

                }
                
                // Check for follow-up pronouns (use last employee)
                const pronouns = ['her', 'him', 'them', 'their', 'she', 'he', 'אותו', 'אותה', 'שלו', 'שלה'];
                let useLastEmployee = pronouns.some(p => q.includes(p));
                
                // Find ALL matching employees
                let matchingEmployees = [];
                for (const emp of employees) {
                    if (emp.fullName === 'OPEN') continue;
                    const nameParts = emp.fullName.toLowerCase().split(/[,\s]+/);
                    for (const part of nameParts) {
                        if (part.length > 2 && q.includes(part)) {
                            matchingEmployees.push(emp);
                            break;
                        }
                    }
                }
                
                // If multiple matches, ask for clarification with clickable options
                if (matchingEmployees.length > 1) {
                    pendingQuestionRef.current = question;
                    // Detect what field is being asked about and store it
                    let detectedField = null;
                    for (const [field, keywords] of Object.entries(fieldMappings)) {
                        for (const keyword of keywords) {
                            if (q.includes(keyword)) {
                                detectedField = field;
                                break;

                        if (detectedField) break;
                    }
                    pendingFieldRef.current = detectedField;
                    // Add field to each employee for the button click
                    const employeesWithField = matchingEmployees.map(e => ({...e, _askField: detectedField}));
                    return { type: 'choices', text: 'I found multiple employees. Which one did you mean?', employees: employeesWithField, field: detectedField };
                }
                
                let foundEmployee = matchingEmployees.length === 1 ? matchingEmployees[0] : null;
                
                // If no employee found but we have pronouns or implicit reference, use last employee
                if (!foundEmployee && lastEmployeeRef.current) {
                    foundEmployee = lastEmployeeRef.current;

                if (!foundEmployee) {
                    return 'לא מצאתי את העובד. נסה שוב עם שם מלא או חלקי. / I couldn\'t find that employee. Try again with a full or partial name.';
                }
                
                // Remember this employee for follow-up questions
                lastEmployeeRef.current = foundEmployee;
                
                // Find what info is being asked
                let foundField = null;
                for (const [field, keywords] of Object.entries(fieldMappings)) {
                    for (const keyword of keywords) {
                        if (q.includes(keyword)) {
                            foundField = field;

                // Build response

                    return `${name}: Monthly: ${monthly}, Yearly: ${yearly}`;

            // Process chat with a specific employee (skips search)
            const processChatWithEmployee = (employee, fieldType) => {

                // Build response

                    return `${name}: ${employee.position}, ${employee.department}, ${employee.email}`;
                }
            };

            // Helper function to check if an employee is a descendant of another
            const isDescendant = (potentialDescendantId, ancestorId) => {
                const findDescendants = (empId) => {
                    const directReports = employees.filter(e => e.managerId === empId);
                    if (directReports.some(r => r.id === potentialDescendantId)) return true;
                    return directReports.some(r => findDescendants(r.id));
                };
                return findDescendants(ancestorId);
            };

            // Load latest employees from the Shefi & Co. server (single source of truth).
            // Falls back silently to the embedded initialEmployees if the server is unreachable.
            useEffect(() => {
                fetch('/api/org-chart')
                    .then(r => (r.ok ? r.json() : null))
                    .then(data => {
                        if (Array.isArray(data) && data.length > 0) {
                            skipNextSyncRef.current = true;
                            setEmployees(data);

                    })
                    .catch(e => console.warn('[org-chart] could not fetch from server, using local data:', e));
            }, []);

            // Auto-save: cache locally + push to the server (debounced).
            // Server is the source of truth — every edit here mirrors into the People tab.
            useEffect(() => {
                try {
                    localStorage.setItem('orgChartEmployees', JSON.stringify(employees));

                if (skipNextSyncRef.current) {
                    skipNextSyncRef.current = false;
                    return;
                }
                const t = setTimeout(() => {
                    fetch('/api/org-chart', {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},

                    .catch(e => console.warn('[org-chart] sync to server failed:', e));
                }, 1500);
                return () => clearTimeout(t);

            // Fit chart to viewport on mount
            useEffect(() => {
                const fitToViewport = () => {
                    if (chartRef.current && containerRef.current) {
                        const chart = chartRef.current;
                        const container = containerRef.current;
                        
                        // Get container size
                        const containerRect = container.getBoundingClientRect();
                        
                        // Get chart's natural size (accounting for current zoom)
                        const chartRect = chart.getBoundingClientRect();
                        const currentZoom = zoom || 1;
                        const chartNaturalWidth = chartRect.width / currentZoom;
                        const chartNaturalHeight = chartRect.height / currentZoom;
                        
                        // Calculate scale to fill width
                        const scaleX = containerRect.width / chartNaturalWidth;
                        const scaleY = containerRect.height / chartNaturalHeight;
                        
                        // Use the larger of width or height scale to ensure we fill the screen
                        // This means the chart will overflow in one direction (scrollable)
                        const finalScale = Math.max(scaleX, scaleY, 0.4);
                        setZoom(finalScale);
                    }
                };
                
                // Give chart more time to fully render, then fit
                // The useEffect on [zoom] will handle recalculating lines
                setTimeout(fitToViewport, 400);
                
                window.addEventListener('resize', fitToViewport);
                return () => window.removeEventListener('resize', fitToViewport);
            }, [employees, calculateLines]);

            const handleZoomIn = () => {
                setZoom(prev => Math.min(prev + 0.1, 2));
            };

                setZoom(prev => Math.max(prev - 0.1, 0.1));
            };

            const handleResetZoom = () => {
                if (chartRef.current && containerRef.current) {
                    const chart = chartRef.current;
                    const container = containerRef.current;
                    const containerRect = container.getBoundingClientRect();
                    
                    // Get chart's natural size (accounting for current zoom)
                    const chartRect = chart.getBoundingClientRect();
                    const chartNaturalWidth = chartRect.width / zoom;
                    const chartNaturalHeight = chartRect.height / zoom;
                    
                    // Calculate scale to fill width
                    const scaleX = containerRect.width / chartNaturalWidth;
                    const scaleY = containerRect.height / chartNaturalHeight;
                    
                    // Use the larger of width or height scale to ensure we fill the screen
                    const finalScale = Math.max(scaleX, scaleY, 0.4);
                    setZoom(finalScale);

            // Calculate lines between nodes
            const calculateLines = useCallback(() => {
                if (!chartRef.current) return;
                const chartRect = chartRef.current.getBoundingClientRect();
                const currentZoom = zoomRef.current || 1;
                const newLines = [];
                
                // Get Elad's children for special line treatment
                const eladChildren = employees.filter(emp => emp.managerId === '6');
                
                employees.forEach(emp => {
                    if (emp.managerId) {
                        const childCard = cardRefs.current[emp.id];

                        if (childCard && parentCard) {
                            const childRect = childCard.getBoundingClientRect();
                            const parentRect = parentCard.getBoundingClientRect();
                            
                            // Calculate positions relative to chart
                            const x1 = (parentRect.left + parentRect.width / 2 - chartRect.left) / currentZoom;
                            const y1 = (parentRect.bottom - chartRect.top) / currentZoom;
                            const x2 = (childRect.left + childRect.width / 2 - chartRect.left) / currentZoom;
                            const y2 = (childRect.top - chartRect.top) / currentZoom;
                            
                            // Special handling for vertical-left teams - use left-side vertical line style
                            const verticalLeftManagers = ['6', '17', '33', '4', '11', '14', '28', '64', '20', '3', '75', '73', '24', '18', '32', '31', '68', '30', '69'];

                            const isVerticalLeft = verticalLeftManagers.includes(emp.managerId) || (parentEmp && parentEmp.hasVerticalLeftLayout);
                            if (isVerticalLeft) {
                                // Get parent's position for the vertical line
                                const parentCardForLine = cardRefs.current[emp.managerId];
                                if (parentCardForLine) {
                                    const parentRectForLine = parentCardForLine.getBoundingClientRect();
                                    const verticalLineX = (parentRectForLine.left + 10 - chartRect.left) / currentZoom;
                                    const childMidY = (childRect.top + childRect.height / 2 - chartRect.top) / currentZoom;
                                    
                                    // Horizontal line from vertical line to child
                                    newLines.push({ 
                                        id: `${emp.managerId}-${emp.id}`, 
                                        x1: verticalLineX, 
                                        y1: childMidY, 
                                        x2: (childRect.left - chartRect.left) / currentZoom, 
                                        y2: childMidY,
                                        type: 'horizontal'
                                    });
                                }
                            } else {
                                newLines.push({ id: `${emp.managerId}-${emp.id}`, x1, y1, x2, y2 });
                            }
                        }
                    }
                });
                
                // Add vertical lines for all vertical-left teams
                const verticalLeftManagerIds = ['6', '17', '33', '4', '11', '14', '28', '64', '20', '3', '75', '73', '24', '18', '32', '31', '68', '30', '69'];
                // Also include employees with hasVerticalLeftLayout property
                const allVerticalLeftIds = [...verticalLeftManagerIds, ...employees.filter(e => e.hasVerticalLeftLayout).map(e => e.id)];
                const uniqueVerticalLeftIds = [...new Set(allVerticalLeftIds)];
                uniqueVerticalLeftIds.forEach(managerId => {
                    const managerChildren = employees.filter(emp => emp.managerId === managerId);
                    if (managerChildren.length > 0) {
                        const managerCard = cardRefs.current[managerId];
                        const lastChildCard = cardRefs.current[managerChildren[managerChildren.length - 1]?.id];
                        
                        if (managerCard && lastChildCard) {
                            const managerRect = managerCard.getBoundingClientRect();
                            const lastChildRect = lastChildCard.getBoundingClientRect();
                            
                            // Vertical line X position - slightly right of manager's left edge
                            const verticalLineX = (managerRect.left + 10 - chartRect.left) / currentZoom;
                            const managerBottomY = (managerRect.bottom - chartRect.top) / currentZoom;
                            const lastChildMidY = (lastChildRect.top + lastChildRect.height / 2 - chartRect.top) / currentZoom;
                            
                            // Vertical line starting from manager's left-bottom corner going down to last child
                            newLines.push({
                                id: `${managerId}-vertical`,
                                x1: verticalLineX,
                                y1: managerBottomY,
                                x2: verticalLineX,
                                y2: lastChildMidY,
                                type: 'vertical'
                            });
                        }
                    }
                });
                
                setLines(newLines);
            }, [employees]);

            // Update lines when zoom or positions change
            useEffect(() => {
                // Update zoomRef immediately before calculating lines
                zoomRef.current = zoom;
                
                // Use requestAnimationFrame to wait for DOM to update after zoom
                const updateLines = () => {
                    requestAnimationFrame(() => {
                        zoomRef.current = zoom; // Ensure zoom is current
                        calculateLines();
                    });
                };
                
                // Multiple attempts with increasing delays to ensure layout is settled
                const timers = [
                    setTimeout(updateLines, 100),
                    setTimeout(updateLines, 300),
                    setTimeout(updateLines, 600),
                    setTimeout(updateLines, 1000)
                ];
                
                return () => {
                    timers.forEach(t => clearTimeout(t));
                };
            }, [nodePositions, zoom, calculateLines]);
            
            // Initial line calculation after mount
            useEffect(() => {
                const updateLinesWithZoom = () => {
                    zoomRef.current = zoom;
                    calculateLines();
                };
                const timers = [
                    setTimeout(updateLinesWithZoom, 600),
                    setTimeout(updateLinesWithZoom, 1200),
                    setTimeout(updateLinesWithZoom, 2000)
                ];
                return () => timers.forEach(t => clearTimeout(t));
            }, [calculateLines, zoom]);

            // Drag handlers
            const handleMouseDown = (e, empId) => {
                if (e.button !== 0) return; // Only left click
                e.preventDefault();
                e.stopPropagation();
                
                const card = cardRefs.current[empId];
                if (!card) return;
                
                const startX = e.clientX;
                const startY = e.clientY;
                const currentPos = nodePositions[empId] || { x: 0, y: 0 };
                
                hasDragged.current = false; // Reset drag flag
                
                // Get all descendants and their current positions
                const getDescendants = (parentId) => {
                    const children = employees.filter(emp => emp.managerId === parentId);
                    let descendants = [...children];
                    children.forEach(child => {
                        descendants = [...descendants, ...getDescendants(child.id)];
                    });
                    return descendants;
                };
                
                const descendants = getDescendants(empId);
                const descendantStartPositions = {};
                descendants.forEach(desc => {
                    descendantStartPositions[desc.id] = nodePositions[desc.id] || { x: 0, y: 0 };
                });
                
                setDragging({
                    empId,
                    startX,
                    startY,
                    startPosX: currentPos.x,
                    startPosY: currentPos.y,
                    descendantStartPositions
                });
            };

            const handleMouseMove = useCallback((e) => {
                if (!dragging) return;
                
                const dx = (e.clientX - dragging.startX) / zoomRef.current;
                const dy = (e.clientY - dragging.startY) / zoomRef.current;
                
                // Mark as dragged if moved more than 3 pixels
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                    hasDragged.current = true;
                }
                
                // Check if this is a level 2 employee (direct report to Itzik)
                const emp = employees.find(e => e.id === dragging.empId);
                const isLevel2 = emp && emp.managerId === '1';
                
                // Get all children of the dragged employee
                const getDescendants = (empId) => {
                    const children = employees.filter(e => e.managerId === empId);
                    let descendants = [...children];
                    children.forEach(child => {
                        descendants = [...descendants, ...getDescendants(child.id)];
                    });
                    return descendants;
                };
                
                const descendants = getDescendants(dragging.empId);
                
                setNodePositions(prev => {
                    const newPositions = {
                        ...prev,
                        [dragging.empId]: {
                            x: dragging.startPosX + dx,
                            // Lock Y position for level 2 employees (Itzik's direct reports)
                            y: isLevel2 ? dragging.startPosY : dragging.startPosY + dy
                        }
                    };
                    
                    // Move all descendants with the parent
                    descendants.forEach(desc => {
                        const descStartPos = dragging.descendantStartPositions?.[desc.id] || { x: 0, y: 0 };
                        newPositions[desc.id] = {
                            x: descStartPos.x + dx,
                            y: isLevel2 ? descStartPos.y : descStartPos.y + dy
                        };
                    });
                    
                    return newPositions;
                });
                
                // Update lines in real-time during drag
                requestAnimationFrame(calculateLines);
            }, [dragging, employees, calculateLines]);

            const handleMouseUp = useCallback(() => {
                if (dragging) {
                    setDragging(null);
                    // Recalculate lines after drag ends
                    setTimeout(calculateLines, 50);
                }
            }, [dragging, calculateLines]);

            // Add global mouse event listeners for dragging
            useEffect(() => {
                if (dragging) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                    return () => {
                        window.removeEventListener('mousemove', handleMouseMove);
                        window.removeEventListener('mouseup', handleMouseUp);
                    };
                }
            }, [dragging, handleMouseMove, handleMouseUp]);

            const buildTree = (emps) => {
                const map = new Map();
                const roots = [];
                emps.forEach(emp => map.set(emp.id, {...emp, children: []}));
                emps.forEach(emp => {
                    const node = map.get(emp.id);
                    if (emp.managerId) {
                        const manager = map.get(emp.managerId);
                        if (manager) {
                            manager.children.push(node);
                            if (emp.managerId === '1') {
                                console.log(`Added ${emp.fullName} (id: ${emp.id}) to Itzik's children. Total children now: ${manager.children.length}`);
                            }
                        } else {
                            // Orphaned employee (manager doesn't exist) - add to root
                            console.warn(`Employee ${emp.fullName} (${emp.id}) has invalid managerId: ${emp.managerId}. Adding to root.`);
                            roots.push(node);
                        }
                    } else {
                        roots.push(node);
                    }
                });
                
                // Sort children to maintain order from employees array
                const sortChildren = (node) => {
                    if (node.children && node.children.length > 0) {
                        const employeeOrder = new Map(emps.map((emp, index) => [emp.id, index]));
                        node.children.sort((a, b) => {
                            const orderA = employeeOrder.get(a.id) ?? Infinity;
                            const orderB = employeeOrder.get(b.id) ?? Infinity;
                            return orderA - orderB;
                        });
                        node.children.forEach(sortChildren);
                    }
                };
                
                // Sort root employees
                const rootOrder = new Map(emps.map((emp, index) => [emp.id, index]));
                roots.sort((a, b) => {
                    const orderA = rootOrder.get(a.id) ?? Infinity;
                    const orderB = rootOrder.get(b.id) ?? Infinity;
                    return orderA - orderB;
                });
                
                // Sort all children recursively
                roots.forEach(sortChildren);
                
                console.log('Tree built. Root count:', roots.length, 'Root employees:', roots.map(r => r.fullName));
                if (roots.length > 0) {
                    const itzik = roots[0];
                    console.log('Itzik children count:', itzik.children?.length);
                    if (itzik.children && itzik.children.length > 0) {
                        console.log('Itzik children after sorting:', itzik.children.map((c, idx) => {
                            const order = emps.findIndex(e => e.id === c.id);
                            return `${idx}: ${c.fullName} (id: ${c.id}, array order: ${order})`;
                        }));
                    }
                }
                
                return roots;
            };

            const renderEmployee = (emp) => {
                const hasChildren = emp.children && emp.children.length > 0;
                const isExpanded = true; // Always expanded for now
                
                const isOpen = emp.fullName === 'OPEN';
                const isContractor = emp.isContractor || (emp.position && emp.position.includes('Contractor'));
                const isSpecialRole = emp.position && (
                    emp.position.includes('Intern') || 
                    emp.position.includes('Tech Lead')
                );
                
                const pos = nodePositions[emp.id] || { x: 0, y: 0 };
                const isDraggingThis = dragging && dragging.empId === emp.id;
                
                let cardStyle = { 
                    borderTopColor: getDepartmentColor(emp.department),
                    transform: `translate(${pos.x}px, ${pos.y}px)`,
                    cursor: isDraggingThis ? 'grabbing' : 'grab',
                    userSelect: 'none',
                    position: 'relative',
                    zIndex: isDraggingThis ? 100 : 1
                };
                let cardClassName = 'employee-card';
                
                if (isOpen) {
                    cardStyle = {
                        ...cardStyle,
                        backgroundColor: '#9c27b0',
                        color: 'white',
                        borderTopColor: '#9c27b0',
                        borderColor: '#ccc'
                    };
                    cardClassName = 'employee-card employee-card-open';
                } else if (isContractor) {
                    const deptColor = getDepartmentColor(emp.department);
                    cardStyle = {
                        ...cardStyle,
                        backgroundColor: getPaleColor(deptColor, 0.3),
                        color: '#333',
                        borderTopColor: deptColor,
                        borderColor: '#ccc'
                    };
                    cardClassName = 'employee-card employee-card-contractor';
                } else if (isSpecialRole) {
                    cardStyle = {
                        ...cardStyle,
                        backgroundColor: '#e91e63',
                        color: 'white',
                        borderTopColor: '#e91e63',
                        borderColor: '#ccc'
                    };
                    cardClassName = 'employee-card employee-card-special';
                }
                
                return (
                    <div key={emp.id} className="org-node">
                        <div className="org-node-content">
                            <div className="employee-card-wrapper">
                                <div 
                                    ref={el => cardRefs.current[emp.id] = el}
                                    className={cardClassName} 
                                     style={cardStyle}
                                    onMouseDown={(e) => handleMouseDown(e, emp.id)}
                                    onClick={(e) => {
                                        // Only open modal if not dragged
                                        if (!hasDragged.current) {
                                            setSelectedEmployee(emp);
                                        }
                                    }}>
                                    <div className="employee-name">{emp.fullName}</div>
                                    <div className="employee-position">{emp.position}</div>
                                </div>
                            </div>
                        </div>
                        {hasChildren && isExpanded && (
                            <div className={`org-children ${['6', '17', '33', '4', '11', '14', '28', '64', '20', '3', '75', '73', '24', '18', '32', '31', '68', '30', '69'].includes(emp.id) || emp.hasVerticalLeftLayout ? 'vertical-left' : emp.children.length > 10 ? 'many-children' : ''}`}>
                                {emp.children.map(renderEmployee)}
                            </div>
                        )}
                    </div>
                );
            };

            const renderRootLevel = () => {
                const tree = buildTree(employees);
                if (tree.length === 0) {
                    console.error('Tree is empty!');
                    return null;
                }
                
                const rootEmployee = tree[0]; // Itzik
                if (!rootEmployee) {
                    console.error('Root employee not found!');
                    return null;
                }
                
                const hasChildren = rootEmployee.children && rootEmployee.children.length > 0;
                const isExpanded = true;

                const rootPos = nodePositions[rootEmployee.id] || { x: 0, y: 0 };
                const isDraggingRoot = dragging && dragging.empId === rootEmployee.id;
                
                const rootCardStyle = {
                    borderTopColor: '#000',
                    transform: `translate(${rootPos.x}px, ${rootPos.y}px)`,
                    cursor: isDraggingRoot ? 'grabbing' : 'grab',
                    userSelect: 'none',
                    position: 'relative',
                    zIndex: isDraggingRoot ? 100 : 1
                };

                return (
                    <div className="org-root">
                        <div className="org-root-node">
                            <div className="employee-card-wrapper">
                                <div 
                                    ref={el => cardRefs.current[rootEmployee.id] = el}
                                    className="employee-card" 
                                    style={rootCardStyle}
                                    onMouseDown={(e) => handleMouseDown(e, rootEmployee.id)}
                                    onClick={(e) => {
                                        // Only open modal if not dragged
                                        if (!hasDragged.current) {
                                            setSelectedEmployee(rootEmployee);
                                        }
                                    }}>
                                    <div className="employee-name">{rootEmployee.fullName}</div>
                                    <div className="employee-position">{rootEmployee.position}</div>
                                </div>
                            </div>
                        </div>
                        {hasChildren && isExpanded && (
                            <div className="org-root-children">
                                {rootEmployee.children.map((child, index) => {
                                    return renderEmployee(child);
                                })}
                            </div>
                        )}
                        {!hasChildren && (
                            <div style={{padding: '1rem', color: 'red', background: '#ffebee'}}>
                                WARNING: Root employee has no children!
                            </div>
                        )}
                    </div>
                );
            };

            const tree = buildTree(employees);
            const directReports = selectedEmployee ? employees.filter(e => e.managerId === selectedEmployee.id) : [];
            const manager = selectedEmployee ? employees.find(e => e.id === selectedEmployee.managerId) : null;

            // Count total employees in tree
            const countEmployees = (empList) => {
                let count = 0;
                const traverse = (emp) => {
                    count++;
                    if (emp.children && emp.children.length > 0) {
                        emp.children.forEach(traverse);
                    }
                };
                empList.forEach(traverse);
                return count;
            };

            const totalEmployees = countEmployees(tree);

            return (
                <div>
                    <div className="app-header">
                        <h1>Organization Chart</h1>
                        <button className="btn" onClick={() => { setAddEmployeeData({ fullName: '', position: '', department: '', email: '', managerId: '1', isOpen: false }); setShowAddEmployee(true); }}>+ Add Employee</button>
                        <button className="btn" style={{marginLeft: '0.5rem', background: '#9c27b0'}} onClick={() => setShowDashboard(true)}>📊 Dashboard</button>
                    </div>
                    <div className="org-chart-container">
                        <div className="zoom-controls">
                            <button className="zoom-btn" onClick={handleZoomIn} title="Zoom In">+</button>
                            <button className="zoom-btn" onClick={handleZoomOut} title="Zoom Out">−</button>
                            <button className="zoom-btn" onClick={handleResetZoom} title="Fit to Screen">⌂</button>
                            <button 
                                className="zoom-btn" 
                                onClick={() => {
                                    setNodePositions({});
                                    setTimeout(calculateLines, 100);
                                }} 
                                title="Reset Card Positions"
                                style={{ fontSize: '0.9rem' }}
                            >↺</button>
                            <button 
                                className="zoom-btn" 
                                onClick={() => {
                                    localStorage.setItem('orgChartEmployees', JSON.stringify(employees));
                                    alert('Organization changes saved successfully!');
                                }} 
                                title="Save Changes"
                                style={{ fontSize: '0.8rem', background: '#4caf50', color: 'white', borderColor: '#4caf50' }}
                            >💾 Save</button>
                            <span className="zoom-level">{Math.round(zoom * 100)}%</span>
                            <span style={{ marginLeft: '0.5rem', fontSize: '0.75rem', color: '#666' }}>
                                ({totalEmployees} employees)
                            </span>
                        </div>
                        <div className="org-chart-wrapper" ref={containerRef}>
                            <div 
                                className="org-chart-container-zoom"
                                style={{ transform: `scale(${zoom})`, transformOrigin: 'top center' }}
                            >
                                <div className="org-chart" ref={chartRef} style={{ position: 'relative' }}>
                                    {/* SVG layer for connecting lines */}
                                    <svg 
                                        style={{
                                            position: 'absolute',
                                            top: 0,
                                            left: 0,
                                            width: '100%',
                                            height: '100%',
                                            pointerEvents: 'none',
                                            overflow: 'visible',
                                            zIndex: 0
                                        }}
                                    >
                                        {lines.map(line => (
                                            <g key={line.id}>
                                                {line.type === 'horizontal' || line.type === 'vertical' || line.type === 'connector' ? (
                                                    /* Direct line for Elad's team */
                                                    <line
                                                        x1={line.x1}
                                                        y1={line.y1}
                                                        x2={line.x2}
                                                        y2={line.y2}
                                                        stroke="#999"
                                                        strokeWidth="1.5"
                                                        strokeDasharray="4,3"
                                                    />
                                                ) : (
                                                    /* Standard orthogonal connector */
                                                    <>
                                                        {/* Vertical line from parent bottom to midpoint */}
                                                        <line
                                                            x1={line.x1}
                                                            y1={line.y1}
                                                            x2={line.x1}
                                                            y2={(line.y1 + line.y2) / 2}
                                                            stroke="#999"
                                                            strokeWidth="1.5"
                                                            strokeDasharray="4,3"
                                                        />
                                                        {/* Horizontal line at midpoint */}
                                                        <line
                                                            x1={line.x1}
                                                            y1={(line.y1 + line.y2) / 2}
                                                            x2={line.x2}
                                                            y2={(line.y1 + line.y2) / 2}
                                                            stroke="#999"
                                                            strokeWidth="1.5"
                                                            strokeDasharray="4,3"
                                                        />
                                                        {/* Vertical line from midpoint to child top */}
                                                        <line
                                                            x1={line.x2}
                                                            y1={(line.y1 + line.y2) / 2}
                                                            x2={line.x2}
                                                            y2={line.y2}
                                                            stroke="#999"
                                                            strokeWidth="1.5"
                                                            strokeDasharray="4,3"
                                                        />
                                                    </>
                                                )}
                                            </g>
                                        ))}
                                    </svg>
                                    {renderRootLevel()}
                                </div>
                            </div>
                        </div>
                    </div>
                    {selectedEmployee && (
                        <div className="side-panel">
                            <button className="side-panel-close" onClick={() => { setSelectedEmployee(null); setPreviousEmployee(null); setShowMenu(false); setShowChangeManager(false); setShowFillFromOrg(false); setShowCandidates(false); setShowEditProfile(false); }}>×</button>
                            {selectedEmployee.id !== '1' && (
                                <React.Fragment>
                                    <button className="menu-button" onClick={() => setShowMenu(!showMenu)}>⋮</button>
                                    {showMenu && (
                                        <div className="dropdown-menu">
                                            {(selectedEmployee.isOpen || selectedEmployee.fullName === 'OPEN') ? (
                                                <React.Fragment>
                                                    <button className="dropdown-menu-item" onClick={() => { setShowFillFromOrg(true); setFillFromOrgSearch(''); setShowMenu(false); }}>
                                                        Fill from Organization
                                                    </button>
                                                    <button className="dropdown-menu-item" onClick={() => { setShowCandidates(true); setShowMenu(false); }}>
                                                        Fill from Candidates
                                                    </button>
                                                    <button 
                                                        className="dropdown-menu-item" 
                                                        style={{color: '#d32f2f'}}
                                                        onClick={() => { 
                                                            setShowMenu(false);
                                                            const openPos = selectedEmployee;
                                                            const directReportsOfOpen = employees.filter(e => e.managerId === openPos.id);
                                                            const message = directReportsOfOpen.length > 0 
                                                                ? 'Delete this open position (' + openPos.position + ')?\n\n' + directReportsOfOpen.length + ' direct report(s) will be reassigned to ' + (employees.find(e => e.id === openPos.managerId)?.fullName || 'the manager') + '.'
                                                                : 'Delete this open position (' + openPos.position + ')?';
                                                            setConfirmDialog({
                                                                message: message,
                                                                confirmLabel: 'Yes, Delete',
                                                                cancelLabel: 'Cancel',
                                                                confirmColor: '#d32f2f',
                                                                onConfirm: () => {
                                                                    setEmployees(prev => prev
                                                                        .filter(e => e.id !== openPos.id)
                                                                        .map(e => {
                                                                            if (e.managerId === openPos.id) {
                                                                                return {...e, managerId: openPos.managerId};
                                                                            }
                                                                            return e;
                                                                        })
                                                                    );
                                                                    setSelectedEmployee(null);
                                                                    setConfirmDialog(null);
                                                                    setTimeout(() => { zoomRef.current = zoom; calculateLines(); }, 200);
                                                                },
                                                                onCancel: () => {
                                                                    setConfirmDialog(null);
                                                                }
                                                            });
                                                        }}
                                                    >
                                                        Delete Position
                                                    </button>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <button className="dropdown-menu-item" onClick={() => { 
                                                        setEditFormData({
                                                            fullName: selectedEmployee.fullName,
                                                            position: selectedEmployee.position,
                                                            department: selectedEmployee.department,
                                                            email: selectedEmployee.email,
                                                            phone: selectedEmployee.phone || '',
                                                            techTitle: selectedEmployee.techTitle || '',
                                                            gradeLevel: selectedEmployee.gradeLevel || '',
                                                            jobCode: selectedEmployee.jobCode || '',
                                                            personNumber: selectedEmployee.personNumber || '',
                                                            idNumber: selectedEmployee.idNumber || '',
                                                            country: selectedEmployee.country || '',
                                                            gender: selectedEmployee.gender || '',
                                                            costCenter: selectedEmployee.costCenter || '',
                                                            currency: selectedEmployee.currency || '₪',
                                                            salaryMonthly: selectedEmployee.salaryMonthly || '',
                                                            salaryYearly: selectedEmployee.salaryYearly || '',
                                                            startDate: selectedEmployee.startDate || '',
                                                            birthday: selectedEmployee.birthday || '',
                                                            address: selectedEmployee.address || '',
                                                            notes: selectedEmployee.notes || ''
                                                        });
                                                        setShowEditProfile(true); 
                                                        setShowMenu(false); 
                                                    }}>
                                                        Edit Profile
                                                    </button>
                                                    <button className="dropdown-menu-item" onClick={() => { setShowChangeManager(true); setShowMenu(false); }}>
                                                        Change Manager
                                                    </button>
                                                    {selectedEmployee.isContractor && (
                                                        <button 
                                                            className="dropdown-menu-item" 
                                                            onClick={() => { 
                                                                setShowMenu(false);
                                                                const manager = employees.find(e => e.id === selectedEmployee.managerId);
                                                                const managerDept = manager ? manager.department : selectedEmployee.department;
                                                                setEmployees(prev => prev.map(emp => 
                                                                    emp.id === selectedEmployee.id 
                                                                        ? {...emp, isContractor: false, department: managerDept} 
                                                                        : emp
                                                                ));
                                                                setSelectedEmployee(prev => ({...prev, isContractor: false, department: managerDept}));
                                                                setTimeout(() => { zoomRef.current = zoom; calculateLines(); }, 200);
                                                            }}
                                                        >
                                                            Convert to FTE
                                                        </button>
                                                    )}
                                                    {!selectedEmployee.isContractor && selectedEmployee.id !== '1' && (
                                                        <button 
                                                            className="dropdown-menu-item" 
                                                            onClick={() => { 
                                                                setShowMenu(false);
                                                                setEmployees(prev => prev.map(emp => 
                                                                    emp.id === selectedEmployee.id 
                                                                        ? {...emp, isContractor: true} 
                                                                        : emp
                                                                ));
                                                                setSelectedEmployee(prev => ({...prev, isContractor: true}));
                                                            }}
                                                        >
                                                            Convert to Contractor
                                                        </button>
                                                    )}
                                                    {selectedEmployee.id !== '1' && (
                                                        <button 
                                                            className="dropdown-menu-item" 
                                                            style={{color: '#d32f2f'}}
                                                            onClick={() => { 
                                                                setShowMenu(false);
