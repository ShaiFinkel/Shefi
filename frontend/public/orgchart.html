                                                return month === dashboardMonth;
                                            }).map(emp => {
                                                const startYear = parseInt(emp.startDate.split('-')[0]);
                                                const years = currentYear - startYear;
                                                return {...emp, yearsOfService: years};
                                            }).filter(emp => emp.yearsOfService > 0)
                                            .sort((a, b) => {
                                                const dayA = parseInt(a.startDate.split('-')[2]);
                                                const dayB = parseInt(b.startDate.split('-')[2]);
                                                return dayA - dayB;
                                            });
                                            
                                            if (anniversaries.length === 0) {
                                                return <p style={{color: '#666', fontStyle: 'italic'}}>No work anniversaries this month</p>;
                                            }
                                            
                                            return (
                                                <div style={{maxHeight: '300px', overflow: 'auto'}}>
                                                    {anniversaries.map(emp => (
                                                        <div key={emp.id} style={{
                                                            padding: '0.5rem',
                                                            background: 'white',
                                                            borderRadius: '4px',
                                                            marginBottom: '0.5rem',
                                                            borderLeft: '3px solid ' + getDepartmentColor(emp.department)
                                                        }}>
                                                            <strong>{emp.fullName}</strong>
                                                            <span style={{
                                                                marginLeft: '0.5rem',
                                                                background: '#1565c0',
                                                                color: 'white',
                                                                padding: '0.1rem 0.4rem',
                                                                borderRadius: '10px',
                                                                fontSize: '0.75rem'
                                                            }}>{emp.yearsOfService} year{emp.yearsOfService > 1 ? 's' : ''}</span>
                                                            <div style={{fontSize: '0.85rem', color: '#666'}}>
                                                                {formatDate(emp.startDate)} • {emp.position}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            );
                                        })()}
                                    </div>
                                </div>
                                
                                {/* Summary Stats */}
                                <div style={{marginTop: '1.5rem', padding: '1rem', background: '#f5f5f5', borderRadius: '8px'}}>
                                    <h3 style={{margin: '0 0 1rem 0'}}>📈 Organization Summary</h3>
                                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '1rem', textAlign: 'center'}}>
                                        <div style={{background: 'white', padding: '1rem', borderRadius: '8px'}}>
                                            <div style={{fontSize: '2rem', fontWeight: 'bold', color: '#4caf50'}}>{employees.filter(e => e.fullName !== 'OPEN' && !e.isContractor).length}</div>
                                            <div style={{fontSize: '0.85rem', color: '#666'}}>FTE Employees</div>
                                        </div>
                                        <div style={{background: 'white', padding: '1rem', borderRadius: '8px'}}>
                                            <div style={{fontSize: '2rem', fontWeight: 'bold', color: '#ff9800'}}>{employees.filter(e => e.isContractor).length}</div>
                                            <div style={{fontSize: '0.85rem', color: '#666'}}>Contractors</div>
                                        </div>
                                        <div style={{background: 'white', padding: '1rem', borderRadius: '8px'}}>
                                            <div style={{fontSize: '2rem', fontWeight: 'bold', color: '#9c27b0'}}>{employees.filter(e => e.fullName === 'OPEN').length}</div>
                                            <div style={{fontSize: '0.85rem', color: '#666'}}>Open Positions</div>
                                        </div>
                                        <div style={{background: 'white', padding: '1rem', borderRadius: '8px'}}>
                                            <div style={{fontSize: '2rem', fontWeight: 'bold', color: '#2196f3'}}>{employees.length}</div>
                                            <div style={{fontSize: '0.85rem', color: '#666'}}>Total Headcount</div>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Employees by Country */}
                                <div style={{marginTop: '1.5rem', padding: '1rem', background: '#e8f5e9', borderRadius: '8px'}}>
                                    <h3 style={{margin: '0 0 1rem 0'}}>🌍 Employees by Country</h3>
                                    {(() => {
                                        const countryFlags = {
                                            'Israel': '🇮🇱',
                                            'US': '🇺🇸',
                                            'USA': '🇺🇸',
                                            'Australia': '🇦🇺',
                                            'Canada': '🇨🇦',
                                            'Vietnam': '🇻🇳',
                                            'UK': '🇬🇧',
                                            'Germany': '🇩🇪',
                                            'France': '🇫🇷',
                                            'India': '🇮🇳',
                                            'Philippines': '🇵🇭',
                                            'Singapore': '🇸🇬',
                                            'Colombia': '🇨🇴',
                                            'Unknown': '🏳️'
                                        };
                                        const countryColors = {
                                            'Israel': '#0038b8',
                                            'US': '#b22234',
                                            'USA': '#b22234',
                                            'Australia': '#00008b',
                                            'Canada': '#ff0000',
                                            'Vietnam': '#da251d',
                                            'UK': '#012169',
                                            'Germany': '#000000',
                                            'France': '#002395',
                                            'India': '#ff9933',
                                            'Philippines': '#0038a8',
                                            'Singapore': '#ee2536',
                                            'Colombia': '#fcd116',
                                            'Unknown': '#999999'
                                        };
                                        
                                        const countryCounts = {};
                                        employees.filter(e => e.fullName !== 'OPEN').forEach(emp => {
                                            const country = emp.country || 'Unknown';
                                            countryCounts[country] = (countryCounts[country] || 0) + 1;
                                        });
                                        const sortedCountries = Object.entries(countryCounts).sort((a, b) => b[1] - a[1]);
                                        const total = sortedCountries.reduce((sum, [, count]) => sum + count, 0);
                                        
                                        // Calculate pie chart segments
                                        let currentAngle = 0;
                                        const segments = sortedCountries.map(([country, count]) => {
                                            const percentage = count / total;
                                            const angle = percentage * 360;
                                            const startAngle = currentAngle;
                                            currentAngle += angle;
                                            return { country, count, percentage, startAngle, angle, color: countryColors[country] || '#' + Math.floor(Math.random()*16777215).toString(16) };
                                        });
                                        
                                        // SVG pie chart helper
                                        const polarToCartesian = (cx, cy, r, angleDeg) => {
                                            const angleRad = (angleDeg - 90) * Math.PI / 180;
                                            return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) };
                                        };
                                        
                                        const describeArc = (cx, cy, r, startAngle, endAngle) => {
                                            const start = polarToCartesian(cx, cy, r, endAngle);
                                            const end = polarToCartesian(cx, cy, r, startAngle);
                                            const largeArcFlag = endAngle - startAngle <= 180 ? 0 : 1;
                                            return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
                                        };
                                        
                                        return (
                                            <div style={{display: 'flex', alignItems: 'center', gap: '2rem'}}>
                                                {/* Pie Chart */}
                                                <svg width="200" height="200" viewBox="0 0 200 200">
                                                    {segments.map((seg, idx) => (
                                                        <path
                                                            key={idx}
                                                            d={describeArc(100, 100, 80, seg.startAngle, seg.startAngle + seg.angle)}
                                                            fill={seg.color}
                                                            stroke="white"
                                                            strokeWidth="2"
                                                        />
                                                    ))}
                                                </svg>
                                                
                                                {/* Legend */}
                                                <div style={{flex: 1}}>
                                                    {sortedCountries.map(([country, count]) => (
                                                        <div key={country} style={{
                                                            display: 'flex',
                                                            alignItems: 'center',
                                                            padding: '0.5rem',
                                                            background: 'white',
                                                            borderRadius: '6px',
                                                            marginBottom: '0.5rem'
                                                        }}>
                                                            <span style={{
                                                                width: '16px',
                                                                height: '16px',
                                                                borderRadius: '3px',
                                                                background: countryColors[country] || '#999',
                                                                marginRight: '0.5rem'
                                                            }}></span>
                                                            <span style={{fontSize: '1.5rem', marginRight: '0.5rem'}}>{countryFlags[country] || '🏳️'}</span>
                                                            <span style={{flex: 1, fontWeight: '500'}}>{country}</span>
                                                            <span style={{fontWeight: 'bold', color: '#333'}}>{count}</span>
                                                            <span style={{marginLeft: '0.5rem', color: '#666', fontSize: '0.85rem'}}>({Math.round(count/total*100)}%)</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                                
                                {/* Gender Distribution */}
                                <div style={{marginTop: '1.5rem', padding: '1rem', background: '#fce4ec', borderRadius: '8px'}}>
                                    <h3 style={{margin: '0 0 1rem 0'}}>👥 Gender Distribution</h3>
                                    {(() => {
                                        const genderCounts = { 'Male': 0, 'Female': 0, 'Not Set': 0 };
                                        employees.filter(e => e.fullName !== 'OPEN').forEach(emp => {
                                            if (emp.gender === 'Male') genderCounts['Male']++;
                                            else if (emp.gender === 'Female') genderCounts['Female']++;
                                            else genderCounts['Not Set']++;
                                        });
                                        const total = genderCounts['Male'] + genderCounts['Female'] + genderCounts['Not Set'];
                                        
                                        const genderColors = { 'Male': '#2196f3', 'Female': '#e91e63', 'Not Set': '#9e9e9e' };
                                        const genderIcons = { 'Male': '👨', 'Female': '👩', 'Not Set': '❓' };
                                        
                                        // Calculate pie chart segments
                                        let currentAngle = 0;
                                        const segments = Object.entries(genderCounts).filter(([, count]) => count > 0).map(([gender, count]) => {
                                            const percentage = count / total;
                                            const angle = percentage * 360;
                                            const startAngle = currentAngle;
                                            currentAngle += angle;
                                            return { gender, count, percentage, startAngle, angle, color: genderColors[gender] };
                                        });
                                        
                                        const polarToCartesian = (cx, cy, r, angleDeg) => {
                                            const angleRad = (angleDeg - 90) * Math.PI / 180;
                                            return { x: cx + r * Math.cos(angleRad), y: cy + r * Math.sin(angleRad) };
                                        };
                                        
                                        const describeArc = (cx, cy, r, startAngle, endAngle) => {
                                            const start = polarToCartesian(cx, cy, r, endAngle);
                                            const end = polarToCartesian(cx, cy, r, startAngle);
                                            const largeArcFlag = endAngle - startAngle <= 180 ? 0 : 1;
                                            return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
                                        };
                                        
                                        return (
                                            <div style={{display: 'flex', alignItems: 'center', gap: '2rem'}}>
                                                <svg width="150" height="150" viewBox="0 0 150 150">
                                                    {segments.map((seg, idx) => (
                                                        <path
                                                            key={idx}
                                                            d={describeArc(75, 75, 60, seg.startAngle, seg.startAngle + seg.angle)}
                                                            fill={seg.color}
                                                            stroke="white"
                                                            strokeWidth="2"
                                                        />
                                                    ))}
                                                </svg>
                                                
                                                <div style={{flex: 1}}>
                                                    {Object.entries(genderCounts).filter(([, count]) => count > 0).map(([gender, count]) => (
                                                        <div key={gender} style={{
                                                            display: 'flex',
                                                            alignItems: 'center',
                                                            padding: '0.5rem',
                                                            background: 'white',
                                                            borderRadius: '6px',
                                                            marginBottom: '0.5rem'
                                                        }}>
                                                            <span style={{
                                                                width: '16px',
                                                                height: '16px',
                                                                borderRadius: '3px',
                                                                background: genderColors[gender],
                                                                marginRight: '0.5rem'
                                                            }}></span>
                                                            <span style={{fontSize: '1.5rem', marginRight: '0.5rem'}}>{genderIcons[gender]}</span>
                                                            <span style={{flex: 1, fontWeight: '500'}}>{gender}</span>
                                                            <span style={{fontWeight: 'bold', color: '#333'}}>{count}</span>
                                                            <span style={{marginLeft: '0.5rem', color: '#666', fontSize: '0.85rem'}}>({Math.round(count/total*100)}%)</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Chat Agent */}
                    <div style={{
                        position: 'fixed',
                        bottom: '20px',
                        right: '20px',
                        zIndex: 1000
                    }}>
                        {!showChat ? (
                            <button 
                                onClick={() => setShowChat(true)}
                                style={{
                                    width: '60px',
                                    height: '60px',
                                    borderRadius: '50%',
                                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                    border: 'none',
                                    color: 'white',
                                    fontSize: '1.5rem',
                                    cursor: 'pointer',
                                    boxShadow: '0 4px 15px rgba(102, 126, 234, 0.4)'
                                }}
                            >
                                💬
                            </button>
                        ) : (
                            <div style={{
                                width: '350px',
                                height: '450px',
                                background: 'white',
                                borderRadius: '12px',
                                boxShadow: '0 10px 40px rgba(0,0,0,0.2)',
                                display: 'flex',
                                flexDirection: 'column',
                                overflow: 'hidden'
                            }}>
                                {/* Header */}
                                <div style={{
                                    background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                                    color: 'white',
                                    padding: '1rem',
                                    display: 'flex',
                                    justifyContent: 'space-between',
                                    alignItems: 'center'
                                }}>
                                    <span style={{fontWeight: 'bold'}}>🤖 HR Assistant</span>
                                    <button 
                                        onClick={() => setShowChat(false)}
                                        style={{background: 'none', border: 'none', color: 'white', fontSize: '1.2rem', cursor: 'pointer'}}
                                    >×</button>
                                </div>
                                
                                {/* Messages */}
                                <div style={{
                                    flex: 1,
                                    padding: '1rem',
                                    overflowY: 'auto',
                                    background: '#f5f5f5'
                                }}>
                                    {chatMessages.map((msg, idx) => (
                                        <div key={idx} style={{
                                            marginBottom: '0.75rem',
                                            display: 'flex',
                                            justifyContent: msg.type === 'user' ? 'flex-end' : 'flex-start'
                                        }}>
                                            <div style={{
                                                maxWidth: '80%',
                                                padding: '0.5rem 0.75rem',
                                                borderRadius: msg.type === 'user' ? '12px 12px 0 12px' : '12px 12px 12px 0',
                                                background: msg.type === 'user' ? '#667eea' : 'white',
                                                color: msg.type === 'user' ? 'white' : '#333',
                                                boxShadow: '0 1px 2px rgba(0,0,0,0.1)',
                                                fontSize: '0.9rem',
                                                lineHeight: '1.4'
                                            }}>
                                                {msg.text}
                                                {msg.choices && (
                                                    <div style={{ marginTop: '0.5rem', display: 'flex', flexDirection: 'column', gap: '0.25rem' }}>
                                                        {msg.choices.map((emp, i) => (
                                                            <button
                                                                key={emp.id}
                                                                onClick={() => {
                                                                    // Set this employee as selected  
                                                                    lastEmployeeRef.current = emp;
                                                                    const fieldType = emp._askField || msg.field;
                                                                    setChatMessages(prev => [...prev, {type: 'user', text: emp.fullName}]);
                                                                    // Process with forced employee selection
                                                                    const response = processChatWithEmployee(emp, fieldType);
                                                                    setChatMessages(prev => [...prev, {type: 'bot', text: response}]);
                                                                }}
                                                                style={{
                                                                    padding: '0.4rem 0.75rem',
                                                                    background: '#667eea',
                                                                    color: 'white',
                                                                    border: 'none',
                                                                    borderRadius: '6px',
                                                                    cursor: 'pointer',
                                                                    fontSize: '0.85rem',
                                                                    textAlign: 'left',
                                                                    transition: 'background 0.2s'
                                                                }}
                                                                onMouseOver={(e) => e.target.style.background = '#5a6fd6'}
                                                                onMouseOut={(e) => e.target.style.background = '#667eea'}
                                                            >
                                                                {emp.fullName} ({emp.position})
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                {/* Input */}
                                <div style={{
                                    padding: '0.75rem',
                                    borderTop: '1px solid #eee',
                                    display: 'flex',
                                    gap: '0.5rem'
                                }}>
                                    <input 
                                        type="text"
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        onKeyPress={(e) => {
                                            if (e.key === 'Enter' && chatInput.trim()) {
                                                const userMsg = chatInput.trim();
                                                setChatMessages(prev => [...prev, {type: 'user', text: userMsg}]);
                                                const response = processChat(userMsg);
                                                setTimeout(() => {
                                                    if (typeof response === 'object' && response.type === 'choices') {
                                                        setChatMessages(prev => [...prev, {type: 'bot', text: response.text, choices: response.employees, field: response.field}]);
                                                    } else {
                                                        setChatMessages(prev => [...prev, {type: 'bot', text: response}]);
                                                    }
                                                }, 300);
                                                setChatInput('');
                                            }
                                        }}
                                        placeholder="Ask about any employee... / שאל על עובד..."
                                        style={{
                                            flex: 1,
                                            padding: '0.5rem',
                                            borderRadius: '20px',
                                            border: '1px solid #ddd',
                                            outline: 'none',
                                            fontSize: '0.9rem'
                                        }}
                                    />
                                    <button 
                                        onClick={() => {
                                            if (chatInput.trim()) {
                                                const userMsg = chatInput.trim();
                                                setChatMessages(prev => [...prev, {type: 'user', text: userMsg}]);
                                                const response = processChat(userMsg);
                                                setTimeout(() => {
                                                    if (typeof response === 'object' && response.type === 'choices') {
                                                        setChatMessages(prev => [...prev, {type: 'bot', text: response.text, choices: response.employees, field: response.field}]);
                                                    } else {
                                                        setChatMessages(prev => [...prev, {type: 'bot', text: response}]);
                                                    }
                                                }, 300);
                                                setChatInput('');
                                            }
                                        }}
                                        style={{
                                            width: '40px',
                                            height: '40px',
                                            borderRadius: '50%',
                                            background: '#667eea',
                                            border: 'none',
                                            color: 'white',
                                            cursor: 'pointer'
                                        }}
                                    >➤</button>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {/* Custom Confirmation Dialog */}
                    {confirmDialog && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            background: 'rgba(0,0,0,0.5)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            zIndex: 2000
                        }}>
                            <div style={{
                                background: 'white',
                                padding: '1.5rem',
                                borderRadius: '8px',
                                maxWidth: '400px',
                                boxShadow: '0 4px 20px rgba(0,0,0,0.3)'
                            }}>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1rem'}}>
                                    <p style={{margin: 0, fontSize: '1rem', whiteSpace: 'pre-line', flex: 1}}>{confirmDialog.message}</p>
                                    {confirmDialog.showExit !== false && (
                                        <button 
                                            onClick={() => setConfirmDialog(null)}
                                            style={{
                                                background: 'none',
                                                border: 'none',
                                                fontSize: '1.5rem',
                                                cursor: 'pointer',
                                                padding: '0',
                                                marginLeft: '1rem',
                                                color: '#666'
                                            }}
                                        >×</button>
                                    )}
                                </div>
                                <div style={{display: 'flex', gap: '0.75rem', justifyContent: 'flex-end'}}>
                                    <button 
                                        onClick={confirmDialog.onCancel}
                                        style={{
                                            padding: '0.5rem 1rem',
                                            border: '1px solid #ccc',
                                            borderRadius: '4px',
                                            background: 'white',
                                            cursor: 'pointer'
                                        }}
                                    >
                                        {confirmDialog.cancelLabel || 'No'}
                                    </button>
                                    <button 
                                        onClick={confirmDialog.onConfirm}
                                        style={{
                                            padding: '0.5rem 1rem',
                                            border: 'none',
                                            borderRadius: '4px',
                                            background: confirmDialog.confirmColor || '#4caf50',
                                            color: 'white',
                                            cursor: 'pointer'
                                        }}
                                    >
                                        {confirmDialog.confirmLabel || 'Yes'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
